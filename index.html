<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI vs Human</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#fff}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}

#buttons{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:2px;z-index:20;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px}
.mode-btn{background:transparent;color:rgba(255,255,255,0.5);border:none;padding:8px 20px;font-family:inherit;font-size:12px;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:all .3s}
.mode-btn.active{background:rgba(255,255,255,0.12);color:#fff}
.mode-btn:hover{color:rgba(255,255,255,0.8)}

#group-toggle{position:fixed;top:16px;right:20px;display:flex;gap:2px;z-index:20;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px}
.grp-btn{background:transparent;border:none;padding:6px 14px;font-family:inherit;font-size:11px;letter-spacing:0.5px;cursor:pointer;border-radius:5px;transition:all .3s}
.grp-btn.ai-on{background:rgba(220,60,60,0.2);color:#e85555}
.grp-btn.hu-on{background:rgba(60,120,220,0.2);color:#5588ee}
.grp-btn.off{color:rgba(255,255,255,0.25)}
.grp-btn:hover{color:rgba(255,255,255,0.7)}

#data-toggle{position:fixed;top:16px;left:20px;display:flex;gap:2px;z-index:20;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px}
.data-btn{background:transparent;color:rgba(255,255,255,0.5);border:none;padding:6px 14px;font-family:inherit;font-size:11px;letter-spacing:0.5px;cursor:pointer;border-radius:5px;transition:all .3s}
.data-btn.active{background:rgba(255,255,255,0.12);color:#fff}
.data-btn:hover{color:rgba(255,255,255,0.8)}

#legend{position:fixed;top:60px;right:20px;background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:14px 18px;font-size:13px;line-height:1.8;pointer-events:none;z-index:10;opacity:0;transition:opacity .5s}
#legend.visible{opacity:1}
.legend-title{font-size:14px;font-weight:bold;margin-bottom:6px;letter-spacing:0.5px;color:rgba(255,255,255,0.9)}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{color:rgba(255,255,255,0.8)}

#info-box{position:fixed;top:60px;right:20px;background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:14px 18px;pointer-events:none;z-index:10;opacity:0;transition:opacity .5s}
#info-box.visible{opacity:1}
#info-title{font-size:14px;font-weight:bold;color:rgba(255,255,255,0.9)}
#info-count{color:rgba(255,255,255,0.6);font-size:12px;margin-top:4px}

#credit{position:fixed;bottom:14px;left:18px;font-size:12px;color:rgba(255,255,255,0.7);letter-spacing:0.4px;pointer-events:none;z-index:10}

@media(max-width:768px){
  #buttons{top:8px;left:8px;transform:none;padding:2px;gap:1px}
  .mode-btn{padding:6px 10px;font-size:10px;letter-spacing:0.5px}
  #group-toggle{top:8px;right:8px;padding:2px;gap:1px}
  .grp-btn{padding:5px 10px;font-size:10px}
  #data-toggle{top:40px;left:8px;padding:2px;gap:1px}
  .data-btn{padding:5px 8px;font-size:9px}
  #legend{top:auto;bottom:50px;left:8px;right:auto;padding:6px 10px;font-size:9px;line-height:1.4}
  .legend-title{font-size:10px}
  .legend-dot{width:6px;height:6px}
  #info-box{top:auto;bottom:50px;left:8px;right:auto;padding:6px 10px}
  #info-title{font-size:10px}
  #info-count{font-size:9px}
  #credit{bottom:6px;left:8px;font-size:9px}
}
</style>
</head>
<body>
<canvas id="chart"></canvas>

<div id="data-toggle">
  <button class="data-btn active" data-axes="bs">Brightness / Saturation</button>
  <button class="data-btn" data-axes="bh">Brightness / Hue</button>
  <button class="data-btn" data-axes="sh">Saturation / Hue</button>
</div>

<div id="buttons">
  <button class="mode-btn active" data-cat="all">Tümü</button>
  <button class="mode-btn" data-cat="portrait">Portre</button>
  <button class="mode-btn" data-cat="landscape">Manzara</button>
  <button class="mode-btn" data-cat="abstract">Soyut</button>
  <button class="mode-btn" data-cat="cityscape">Kentsel</button>
</div>

<div id="group-toggle">
  <button class="grp-btn ai-on" data-g="AI">AI</button>
  <button class="grp-btn hu-on" data-g="Human">Human</button>
</div>

<div id="info-box">
  <div id="info-title">AI vs Human</div>
  <div id="info-count">720 görsel · 4 kategori</div>
</div>

<div id="legend">
  <div class="legend-title">Kategori</div>
</div>

<div id="credit">Manovich Cultural Analytics · Stable Diffusion 1.5 · Unsplash · ImageJ</div>

<script>
const AI_COLOR = '#dc4646';
const HUMAN_COLOR = '#4678dc';
const catColors = {
  portrait: '#E07A5F',
  landscape: '#81B29A',
  abstract: '#F2CC8F',
  cityscape: '#577590'
};
const catLabels = {
  portrait: 'Portre',
  landscape: 'Manzara',
  abstract: 'Soyut',
  cityscape: 'Kentsel'
};

// Build legend
const legendEl = document.getElementById('legend');
for (const [cat, color] of Object.entries(catColors)) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${catLabels[cat]}</span>`;
  legendEl.appendChild(item);
}
// Add AI/Human to legend
const sep = document.createElement('div');
sep.style.height = '6px';
legendEl.appendChild(sep);
[['AI', AI_COLOR], ['Human', HUMAN_COLOR]].forEach(([label, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${label}</span>`;
  legendEl.appendChild(item);
});

const infoBox = document.getElementById('info-box');
const infoCount = document.getElementById('info-count');

let allData = [];
let activeGroups = new Set(['AI', 'Human']);
let activeCat = 'all';
let currentAxes = 'bs'; // bs = brightness/saturation, bh = brightness/hue, sh = saturation/hue
let transform = d3.zoomIdentity;

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();

const isMobile = () => W < 768;
const getMargin = () => isMobile()
  ? { top: 60, right: 15, bottom: 45, left: 45 }
  : { top: 50, right: 40, bottom: 60, left: 70 };
let margin = getMargin();

const imgCache = {};
function loadImg(fn) {
  if (imgCache[fn]) return imgCache[fn];
  const img = new Image();
  img.src = 'images/' + fn;
  img.onload = () => draw();
  imgCache[fn] = img;
  return img;
}

function parseGroup(fn) { return fn.startsWith('ai_') ? 'AI' : fn.startsWith('human_') ? 'Human' : '?'; }
function parseCat(fn) {
  const f = fn.toLowerCase();
  if (f.includes('portrait') || f.includes('portre')) return 'portrait';
  if (f.includes('landscape')) return 'landscape';
  if (f.includes('abstract') || f.includes('absract')) return 'abstract';
  if (f.includes('cityscape')) return 'cityscape';
  return 'unknown';
}

function getKeys() {
  if (currentAxes === 'bs') return { x: 'brightness_median', y: 'saturation_median', xL: 'Brightness', yL: 'Saturation' };
  if (currentAxes === 'bh') return { x: 'brightness_median', y: 'hue_median', xL: 'Brightness', yL: 'Hue' };
  return { x: 'saturation_median', y: 'hue_median', xL: 'Saturation', yL: 'Hue' };
}

let baseScaleX, baseScaleY;
function buildScales() {
  margin = getMargin();
  baseScaleX = d3.scaleLinear().domain([0, 255]).range([margin.left, W - margin.right]);
  baseScaleY = d3.scaleLinear().domain([0, 255]).range([H - margin.bottom, margin.top]);
}

function getFiltered() {
  return allData.filter(d => activeGroups.has(d.group) && (activeCat === 'all' || d.category === activeCat));
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (!baseScaleX) return;
  const data = getFiltered();
  const keys = getKeys();

  const zx = transform.rescaleX(baseScaleX);
  const zy = transform.rescaleY(baseScaleY);
  const k = transform.k;

  // Zoom thresholds (like DEU campus)
  const COLOR_THRESHOLD = 2.5;
  const PHOTO_THRESHOLD = 5;
  const showCatColors = k >= COLOR_THRESHOLD;
  const showPhotos = k >= PHOTO_THRESHOLD;

  // Toggle info-box vs legend
  if (showCatColors) {
    legendEl.classList.add('visible');
    infoBox.classList.remove('visible');
  } else {
    legendEl.classList.remove('visible');
    infoBox.classList.add('visible');
    const filtered = getFiltered();
    infoCount.textContent = filtered.length + ' görsel · Scroll ile zoom';
  }

  // Clip
  ctx.save();
  ctx.beginPath();
  ctx.rect(margin.left, margin.top, W - margin.left - margin.right, H - margin.top - margin.bottom);
  ctx.clip();

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  zx.ticks(10).forEach(t => {
    const x = zx(t);
    if (x >= margin.left && x <= W - margin.right) {
      ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, H - margin.bottom); ctx.stroke();
    }
  });
  zy.ticks(10).forEach(t => {
    const y = zy(t);
    if (y >= margin.top && y <= H - margin.bottom) {
      ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W - margin.right, y); ctx.stroke();
    }
  });

  // Draw points / colored points / photos
  if (showPhotos) {
    // Photo mode — gradual opacity
    const photoAlpha = Math.min(1, (k - PHOTO_THRESHOLD) / 3);
    const photoSize = Math.max(20, Math.min(60, 16 + (k - PHOTO_THRESHOLD) * 5));
    let drawn = 0;

    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const x = zx(d[keys.x]);
      const y = zy(d[keys.y]);
      if (x < margin.left - photoSize || x > W - margin.right + photoSize || y < margin.top - photoSize || y > H - margin.bottom + photoSize) continue;

      const img = loadImg(d.filename);
      if (img.complete && img.naturalWidth > 0 && drawn < 150) {
        const aspect = img.naturalHeight / img.naturalWidth;
        const iw = photoSize;
        const ih = photoSize * aspect;
        ctx.globalAlpha = photoAlpha * 0.9;
        ctx.drawImage(img, x - iw / 2, y - ih / 2, iw, ih);
        ctx.strokeStyle = d.group === 'AI' ? 'rgba(220,70,70,0.6)' : 'rgba(70,120,220,0.6)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x - iw / 2, y - ih / 2, iw, ih);
        ctx.globalAlpha = 1;
        drawn++;
      } else {
        // Fallback dot
        ctx.fillStyle = catColors[d.category] || '#fff';
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(x, y, Math.max(1, 1 + (k - COLOR_THRESHOLD) * 0.2), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  } else if (showCatColors) {
    // Category color mode — gradual transition
    const colorAlpha = Math.min(0.9, (k - COLOR_THRESHOLD) / 2);
    const dotSize = Math.max(1, 1 + (k - COLOR_THRESHOLD) * 0.3);

    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const x = zx(d[keys.x]);
      const y = zy(d[keys.y]);
      if (x < margin.left - 5 || x > W - margin.right + 5 || y < margin.top - 5 || y > H - margin.bottom + 5) continue;

      ctx.fillStyle = catColors[d.category] || '#fff';
      ctx.globalAlpha = colorAlpha;
      ctx.beginPath();
      ctx.arc(x, y, dotSize, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else {
    // Default: AI red, Human blue dots
    const dotSize = Math.max(1, Math.min(3, 1 * Math.min(k, 3)));

    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const x = zx(d[keys.x]);
      const y = zy(d[keys.y]);
      if (x < margin.left - 5 || x > W - margin.right + 5 || y < margin.top - 5 || y > H - margin.bottom + 5) continue;

      ctx.fillStyle = d.group === 'AI' ? AI_COLOR : HUMAN_COLOR;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(x, y, dotSize, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Axes
  const mob = isMobile();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(margin.left, H - margin.bottom); ctx.lineTo(W - margin.right, H - margin.bottom); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(margin.left, margin.top); ctx.lineTo(margin.left, H - margin.bottom); ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = (mob ? '9' : '11') + 'px monospace';
  ctx.textAlign = 'center';
  const tickCount = mob ? 5 : 8;
  zx.ticks(tickCount).forEach(t => {
    const x = zx(t);
    if (x >= margin.left && x <= W - margin.right) {
      ctx.beginPath(); ctx.moveTo(x, H - margin.bottom); ctx.lineTo(x, H - margin.bottom + 5); ctx.stroke();
      ctx.fillText(Math.round(t), x, H - margin.bottom + (mob ? 14 : 18));
    }
  });
  ctx.textAlign = 'right';
  zy.ticks(tickCount).forEach(t => {
    const y = zy(t);
    if (y >= margin.top && y <= H - margin.bottom) {
      ctx.beginPath(); ctx.moveTo(margin.left - 5, y); ctx.lineTo(margin.left, y); ctx.stroke();
      ctx.fillText(Math.round(t), margin.left - 6, y + 4);
    }
  });

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = (mob ? '10' : '13') + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(keys.xL, (margin.left + W - margin.right) / 2, H - (mob ? 4 : 12));
  ctx.save();
  ctx.translate(mob ? 10 : 16, (margin.top + H - margin.bottom) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(keys.yL, 0, 0);
  ctx.restore();
}

// D3 zoom
const zoom = d3.zoom()
  .scaleExtent([1, 25])
  .on('zoom', (event) => { transform = event.transform; draw(); });
d3.select(canvas).call(zoom);

// Double click reset
canvas.addEventListener('dblclick', () => {
  transform = d3.zoomIdentity;
  d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
});

// Category buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    transform = d3.zoomIdentity;
    d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
  });
});

// Group toggle
document.querySelectorAll('.grp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.g;
    if (activeGroups.has(g)) {
      if (activeGroups.size > 1) { activeGroups.delete(g); btn.className = 'grp-btn off'; }
    } else {
      activeGroups.add(g);
      btn.className = 'grp-btn ' + (g === 'AI' ? 'ai-on' : 'hu-on');
    }
    draw();
  });
});

// Axes toggle
document.querySelectorAll('.data-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.data-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentAxes = btn.dataset.axes;
    transform = d3.zoomIdentity;
    d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
  });
});

// Load data
async function loadData() {
  const resp = await fetch('measurements.txt');
  const text = await resp.text();
  const lines = text.trim().split('\n');

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split('\t');
    if (cols.length < 8) continue;
    const fn = cols[0].trim();
    if (!fn) continue;
    const bm = parseFloat(cols[2]);
    const sm = parseFloat(cols[4]);
    const hm = parseFloat(cols[6]);
    if (isNaN(bm) || isNaN(sm) || isNaN(hm)) continue;
    allData.push({
      filename: fn, group: parseGroup(fn), category: parseCat(fn),
      brightness_median: bm, saturation_median: sm, hue_median: hm
    });
  }
  console.log('Loaded:', allData.length);
  buildScales();
  draw();
}

window.addEventListener('resize', () => { resize(); margin = getMargin(); buildScales(); draw(); });
loadData();
</script>
</body>
</html>
